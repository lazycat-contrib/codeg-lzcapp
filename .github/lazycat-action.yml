version: 1

project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/codeg.lpk

update:
  strategy: publish
  allow_downgrade: false
  version_source:
    type: image
    image: codeg

build:
  run_buildscript: false

images:
  - id: codeg
    target: service
    service: codeg
    source: ghcr.io/xintaofei/codeg
    channel: stable
    tag_regex: '^v?[0-9]+\.[0-9]+\.[0-9]+$'
    delivery:
      mode: lazycat

stores:
  official:
    enabled: true
    skip_if_version_exists: true
  private:
    enabled: true
    skip_if_version_exists: true
    name: Codeg
    summary: 一站式聚合浏览 Claude Code、Codex、Gemini CLI 等编程助手会话

